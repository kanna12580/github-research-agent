services:
  api:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepintel-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL:-postgresql://deepintel:deepintel_secret@db:5432/deepintel}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5-flash}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-8192}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}
      - LLM_FALLBACK_API_KEY=${LLM_FALLBACK_API_KEY:-}
      - RAG_EMBED_MODEL=${RAG_EMBED_MODEL:-BAAI/bge-m3}
      - RAG_EMBED_DIMENSION=${RAG_EMBED_DIMENSION:-1024}
      - RAG_RERANK_MODEL=${RAG_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      - RAG_RERANK_DEVICE=${RAG_RERANK_DEVICE:-cpu}
      - RAG_RETRIEVAL_TOP_K=${RAG_RETRIEVAL_TOP_K:-20}
      - RAG_RERANK_TOP_N=${RAG_RERANK_TOP_N:-10}
      - RAG_RRF_K=${RAG_RRF_K:-60}
      - PLAYWRIGHT_HEADLESS=${PLAYWRIGHT_HEADLESS:-true}
      - PLAYWRIGHT_POOL_SIZE=${PLAYWRIGHT_POOL_SIZE:-2}
      - PLAYWRIGHT_NAVIGATION_TIMEOUT=${PLAYWRIGHT_NAVIGATION_TIMEOUT:-30000}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - API_LOG_LEVEL=${API_LOG_LEVEL:-INFO}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-db,redis,localhost,127.0.0.1}
      - http_proxy=${DOCKER_HTTP_PROXY:-}
      - https_proxy=${DOCKER_HTTPS_PROXY:-}
      - no_proxy=${DOCKER_NO_PROXY:-db,redis,localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: pgvector/pgvector:pg16
    container_name: deepintel-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-deepintel}
      - POSTGRES_USER=${POSTGRES_USER:-deepintel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-deepintel_secret}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepintel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepintel-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  # Frontend (production build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepintel-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
